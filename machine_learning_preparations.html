<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Tool</title>
    <link rel="icon" type="image/png" href="machine_learning/icon.png">
    <link rel="stylesheet" href="machine_learning/machine_learning.css  ">
    <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="machine_learning/machine_learning.js" defer></script>
</head>
<body>
    <header>
        <h1>DataTorn</h1>
        <h2>For data pre-processing</h2>
        <nav>
            <a href="index.html"><button id="home_button">Home</button></a>
        </nav>
    </header>
    <main>
        <section class="section">
            <h1>Start by uploading your csv file</h1>
            <button onclick="scroll_down()" title="scroll_down"><h3>🔻</h3></button>
            <input type="file" name="csv">
        </section>
        <section>
            <section id="column_menu">
                <h3>Column Menu</h3>
                <label>menu 🔨 <button>On development</button></label>
                <button onclick="trigger_column_menu()">Done 😎</button>
            </section>
        <section>
            <table>
                <thead></thead>
                <tbody></tbody>
                <tfoot></tfoot>
            </table>
            <section id="date_selection">
                <label>Choose the column for date *<select id="target_column"></select></label>
                <label>Year: <input id="year" type="number" value="2026" min="2000"></label>
                <label>Month: <input id="month" type="number" min="1" max="12"></label>
            </section>
        </section>
            <u><h1>Controls</h1></u>
            <section class="buttons">
                <label> <button onclick="verify_structure()"><b>Verify the csv structure</b></button></label>
                <label><button onclick="check_duplicates()"><b>Check For duplicates</b> </button></label>
                <label><button onclick="check_missing_values()"><b>Check For blank entries</b> </button></label>
                <label><button onclick="show_incosistency()"><b>Show Inconsistent column</b> </button></label>
                <label><button onclick="upload_demo()"><b>load a demo file</b> </button></label>
            </section>
            <section class="buttons">
                <label><button onclick="show_stats()"><b>Show all statistics</b> </button></label>
                <label><button onclick="show_sum()"><b>Summation</b> </button></label>
                <label><button onclick="show_mean()"><b>Mean</b> </button></label>
                <label><button onclick="show_std_deviation()"><b>Standard deviation</b> </button></label>
                <label><button onclick="reset()"><b>reset</b> </button></label>
            </section>
            <button onclick="scroll_up()" title="scroll_up"><h3>🔺</h3></button>
            <p class="Sig_text"></p>
        </section>
    </main>
</body>
